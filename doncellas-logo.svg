    C231,285 231,295 230,305
    C228,312 224,315 220,315
    C216,315 213,312 212,308
    C211,302 212,292 213,282
    C214,272 216,264 215,255
    C214,246 210,240 207,232
    C205,228 205,224 205,220 Z"
        fill="#C9A84C"/>

  <!-- Eye detail -->
  <ellipse cx="258" cy="195" rx="5" ry="4" fill="#0A0A0A"/>
  <path d="M250,190 C253,185 262,184 268,188" fill="none" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"/>

