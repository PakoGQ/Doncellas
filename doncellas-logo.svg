        fill="none" stroke="#C9A84C" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Female face silhouette inside D (profile facing right) -->
  <!-- Neck -->
  <path d="M215,305 C215,305 218,320 220,330 C222,340 230,344 230,344 L225,344 C225,344 212,340 210,330 C208,320 205,305 205,305 Z"
        fill="#C9A84C"/>

  <!-- Head/face profile -->
  <path d="
    M205,220
    C205,195 212,178 225,168
    C235,160 248,158 258,162
    C270,167 278,178 280,193
    C282,205 278,218 272,228
    C266,238 258,244 252,248
    C248,251 244,253 240,258
