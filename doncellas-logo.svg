  <!-- DONCELLAS text -->
  <text x="250" y="410"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36"
        font-weight="normal"
        letter-spacing="10"
        text-anchor="middle"
        fill="#C9A84C">DONCELLAS</text>

  <!-- thin decorative line under text -->
  <line x1="140" y1="425" x2="360" y2="425" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
</svg>
