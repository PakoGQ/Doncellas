  <!-- Lips -->
  <path d="M252,230 C256,228 262,228 266,230 C262,235 256,235 252,230 Z" fill="#0A0A0A"/>

  <!-- Hair flowing along inside of D arc -->
  <path d="
    M205,220
    C200,205 200,188 208,173
    C216,158 228,148 244,145
    C258,142 272,147 282,157
    C295,169 298,186 295,202
    C300,195 305,182 302,165
    C298,145 284,128 265,120
    C248,113 228,115 212,125
    C195,136 184,155 181,175
    C178,192 182,210 190,225
    C196,235 203,240 205,235
    C206,228 205,224 205,220 Z"
        fill="#C9A84C"/>

  <!-- Flowing hair tail (sweeping down along D arc interior) -->
  <path d="
    M282,157
    C295,170 310,185 318,205
    C326,225 325,248 318,268
    C310,290 295,308 278,318
    C268,324 258,326 252,326
    C248,326 248,320 252,318
